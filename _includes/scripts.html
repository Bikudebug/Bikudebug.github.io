<!-- 3D Flowing Energy Aura GUI Background (DBZ Vibe) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var auraDiv = document.createElement('div');
    auraDiv.id = 'aura-bg';
    auraDiv.style.cssText = 'position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:0; pointer-events:none;';
    document.body.prepend(auraDiv);

    VANTA.WAVES({
      el: "#aura-bg",
      mouseControls: false,
      touchControls: false,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0xff8c00, /* Dark orange/gold energy */
      backgroundColor: 0x011326, /* Deep Space/Academic dark blue */
      waveHeight: 30.00,
      waveSpeed: 0.80, /* Smooth continuous rolling animation */
      zoom: 1.20
    });
  });
</script>
